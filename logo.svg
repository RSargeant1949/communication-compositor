<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <rect width="200" height="120" rx="12" fill="#f4f3f0"/>
  <!-- Three arrows in from left (the blocks) -->
  <line x1="10" y1="30" x2="72" y2="50" stroke="#5b4fd4" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="72,50 60,44 63,55" fill="#5b4fd4"/>
  <line x1="10" y1="60" x2="72" y2="60" stroke="#0891b2" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="72,60 60,54 60,66" fill="#0891b2"/>
  <line x1="10" y1="90" x2="72" y2="70" stroke="#d97706" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="72,70 60,65 63,76" fill="#d97706"/>
  <!-- CC mark -->
  <text x="78" y="78" font-family="Georgia, serif" font-size="44" font-weight="700" fill="#1a1a1a" letter-spacing="-2">CC</text>
  <!-- One send arrow out to right -->
  <line x1="138" y1="60" x2="188" y2="60" stroke="#5b4fd4" stroke-width="3" stroke-linecap="round"/>
  <polygon points="188,60 174,53 174,67" fill="#5b4fd4"/>
  <!-- Tagline -->
  <text x="100" y="112" font-family="monospace" font-size="8" fill="#8a8880" text-anchor="middle" letter-spacing="1">COMMUNICATION COMPOSITOR</text>
</svg>
